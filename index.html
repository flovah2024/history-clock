<!DOCTYPE html>

<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>History Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:env(safe-area-inset-top) 8vw env(safe-area-inset-bottom)}
#c{perspective:800px;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1}
.card{transform-style:preserve-3d;width:100%}
#t,#e{font-size:clamp(20px,5vw,40px);font-weight:300;letter-spacing:0.01em;line-height:1.5;opacity:0.9}
#t{margin-bottom:0.3em}
#t .s{font-size:0.55em;opacity:0.45;letter-spacing:0.15em;font-variant-numeric:tabular-nums}
#d{font-size:clamp(11px,2.5vw,16px);font-weight:300;letter-spacing:0.05em;opacity:0.35;margin-top:1.2em}
#l{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);font-size:12px;font-weight:300;letter-spacing:0.35em;opacity:0.2}
@keyframes fo{0%{transform:rotateX(0);opacity:1}50%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(-90deg);opacity:0}}
@keyframes fi{0%{transform:rotateX(90deg);opacity:0}50%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
.fo{animation:fo .7s ease-in forwards;transform-origin:bottom center}
.fi{animation:fi .7s ease-out forwards;transform-origin:top center}
@media(orientation:portrait){#t,#e{font-size:clamp(28px,7vw,56px)}#d{font-size:clamp(14px,3.5vw,22px)}}
</style>
</head>
<body>
<div id="c"><div class="card"><div id="t"></div><div id="e"></div><div id="d"></div></div></div>
<div id="l">FLOVAH</div>
<script>

function p(n){return String(n).padStart(2,"0")}
E.sort(function(a,b){return(a[0]*60+a[1])-(b[0]*60+b[1])});
function timeStr(h,m,s){var ap=h<12?"오전":"오후";var h2=h===0?12:h>12?h-12:h;return ap+" "+h2+"시 "+m+"분 <span class=s>:"+p(s)+"</span>";}
function findEv(h,m){for(var i=0;i<E.length;i++){if(E[i][0]===h&&E[i][1]===m)return E[i]}return null}
function findNext(h,m){var now=h*60+m;for(var i=0;i<E.length;i++){var t=E[i][0]*60+E[i][1];if(t>now)return t-now}var f=E[0][0]*60+E[0][1];return(1440-now)+f}
var wl=null;
function rw(){try{navigator.wakeLock.request("screen").then(function(l){wl=l})}catch(e){}}
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible")rw()});
var lk="";
function up(){var n=new Date();var h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();var te=document.getElementById("t");var ee=document.getElementById("e");var de=document.getElementById("d");var cd=document.querySelector(".card");te.innerHTML=timeStr(h,m,s);var k=p(h)+":"+p(m);if(k===lk)return;lk=k;var ev=findEv(h,m);cd.classList.remove("fi");cd.classList.add("fo");setTimeout(function(){if(ev){ee.innerHTML=ev[2];de.textContent="("+ev[3]+")";}else{var nx=findNext(h,m);if(nx<=60){ee.innerHTML="앞으로 "+nx+"분 후<br>하나의 사건이 발생합니다";}else{var hr=Math.floor(nx/60);var mn=nx%60;ee.innerHTML="앞으로 "+hr+"시간 "+mn+"분 후<br>하나의 사건이 발생합니다";}de.textContent="";}cd.classList.remove("fo");cd.classList.add("fi");},350)}
rw();up();setInterval(up,1000);
var lv=true;document.body.addEventListener("click",function(){lv=!lv;document.getElementById("l").style.opacity=lv?"0.2":"0"});
</script></body></html>
