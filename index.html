<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>History Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:env(safe-area-inset-top) 8vw env(safe-area-inset-bottom)}
#clock-container{perspective:800px;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1}
.card{transform-style:preserve-3d;position:relative;width:100%}
#time-text,#event-text{font-size:clamp(20px,5vw,40px);font-weight:300;letter-spacing:0.01em;line-height:1.5;opacity:0.9}
#time-text{margin-bottom:0.3em}
#date-text{font-size:clamp(11px,2.5vw,16px);font-weight:300;letter-spacing:0.05em;opacity:0.35;margin-top:1.2em}
#logo{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);font-size:12px;font-weight:300;letter-spacing:0.35em;opacity:0.2;pointer-events:none}
@keyframes flipOut{0%{transform:rotateX(0deg);opacity:1}50%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateX(90deg);opacity:0}50%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0deg);opacity:1}}
.flip-out{animation:flipOut 0.7s ease-in forwards;transform-origin:bottom center}
.flip-in{animation:flipIn 0.7s ease-out forwards;transform-origin:top center}
</style>
</head>
<body>
<div id="clock-container"><div class="card">
<div id="time-text"></div><div id="event-text"></div><div id="date-text"></div>
</div></div>
<div id="logo">FLOVAH</div>
<script>
const E={"00:00":{t:"자정이 지나고 새로운 하루가\n시작되었습니다",d:"매일"},"00:30":{t:"인도가 영국으로부터\n독립을 선언하였습니다",d:"1947년 8월 15일"},"01:05":{t:"타이타닉호의 마지막 구명보트가\n바다 위에 내려졌습니다",d:"1912년 4월 15일"},"01:23":{t:"체르노빌 원자력 발전소 4호기가\n폭발하였습니다",d:"1986년 4월 26일"},"02:15":{t:"라이트 형제가 키티호크에서\n동력 비행에 성공하였습니다",d:"1903년 12월 17일"},"02:47":{t:"아폴로 13호의 산소 탱크가\n폭발하였습니다",d:"1970년 4월 14일"},"03:00":{t:"간디가 소금 행진을\n시작하였습니다",d:"1930년 3월 12일"},"03:45":{t:"세종대왕이 훈민정음을\n반포하였습니다",d:"1446년 10월 9일"},"04:00":{t:"손기정 선수가 베를린 올림픽\n마라톤에서 금메달을 획득하였습니다",d:"1936년 8월 9일"},"04:15":{t:"이순신 장군이 한산도 대첩에서\n왼군을 대파하였습니다",d:"1592년 8월 14일"},"04:30":{t:"황영조 선수가 바르셀로나 올림픽\n마라톤에서 금메달을 획득하였습니다",d:"1992년 8월 9일"},"05:00":{t:"2002 월드컵 한국 대 폴란드전에서\n황선홍이 선제골을 넣었습니다",d:"2002년 6월 4일"},"05:30":{t:"동학 농민 운동이\n시작되었습니다",d:"1894년 2월"},"06:00":{t:"연합군이 노르망디 해변에\n상륙을 개시하였습니다",d:"1944년 6월 6일"},"06:15":{t:"에베레스트 정상에 인류가\n처음으로 도달하였습니다",d:"1953년 5월 29일"},"07:00":{t:"봉준호 감독이 칸 영화제에서\n황금종려상을 수상하였습니다",d:"2019년 5월 25일"},"07:30":{t:"챌린저 우주왕복선이\n발사 73초 만에 폭발하였습니다",d:"1986년 1월 28일"},"08:00":{t:"3.1 만세 운동이\n시작되었습니다",d:"1919년 3월 1일"},"08:15":{t:"히로시마에 원자폭탄\n리틀보이가 투하되었습니다",d:"1945년 8월 6일"},"08:30":{t:"김연아 선수가 세계 신기록으로\n금메달을 획득하였습니다",d:"2010년 2월 25일"},"08:46":{t:"항공기 한 대가 세계무역센터\n북쪽 타워에 충돌하였습니다",d:"2001년 9월 11일"},"09:03":{t:"두 번째 항공기가 세계무역센터\n남쪽 타워에 충돌하였습니다",d:"2001년 9월 11일"},"09:15":{t:"베를린 장벽이\n무너지기 시작하였습니다",d:"1989년 11월 9일"},"09:30":{t:"넬슨 만델라가 27년 만에\n감옥에서 석방되었습니다",d:"1990년 2월 11일"},"09:45":{t:"세월호가 진도 앞바다에서\n침몰하기 시작하였습니다",d:"2014년 4월 16일"},"10:00":{t:"대한민국 정부가\n수립되었습니다",d:"1948년 8월 15일"},"10:56":{t:"닐 암스트롱이 달 표면에\n인류의 첫 발을 내딕었습니다",d:"1969년 7월 20일"},"11:00":{t:"제1차 세계대전의 휴전 협정이\n발효되었습니다",d:"1918년 11월 11일"},"11:30":{t:"6.25 전쟁 휴전 협정이\n체결되었습니다",d:"1953년 7월 27일"},"11:45":{t:"DNA 이중나선 구조가\n발견되었습니다",d:"1953년 2월 28일"},"12:00":{t:"대한민국이 IMF에\n구제금융을 신청하였습니다",d:"1997년 11월 21일"},"12:30":{t:"존 F. 케네디 대통령이\n달라스에서 저격당하였습니다",d:"1963년 11월 22일"},"13:00":{t:"BTS가 빌보드 핫100\n1위를 달성하였습니다",d:"2020년 8월 31일"},"13:15":{t:"스티브 잡스가 최초의\n아이폰을 공개하였습니다",d:"2007년 1월 9일"},"13:30":{t:"5.18 광주 민주화 운동이\n시작되었습니다",d:"1980년 5월 18일"},"14:00":{t:"프랑스 대혁명이\n시작되었습니다",d:"1789년 7월 14일"},"14:30":{t:"안정환 선수가 2002 월드컵\n미국전에서 결승골을 넣었습니다",d:"2002년 6월 10일"},"14:46":{t:"동일본 대지진이\n발생하였습니다",d:"2011년 3월 11일"},"15:00":{t:"아인슈타인이 특수상대성이론을\n발표하였습니다",d:"1905년 6월 30일"},"15:49":{t:"마틴 루터 킹 주니어가\n멀피스에서 암살당하였습니다",d:"1968년 4월 4일"},"16:00":{t:"2002 월드컵에서 대한민국이\n4강에 진출하였습니다",d:"2002년 6월 22일"},"17:00":{t:"싸이의 강남스타일이\n유튜브 10억 뷰를 돌파하였습니다",d:"2012년 12월 21일"},"17:30":{t:"6월 민주항쟁이\n시작되었습니다",d:"1987년 6월 10일"},"18:00":{t:"88 서울 올림픽이\n개막하였습니다",d:"1988년 9월 17일"},"19:00":{t:"봉준호 감독의 기생충이\n아카데미 작품상을 수상하였습니다",d:"2020년 2월 9일"},"19:15":{t:"미국 독립선언서가\n채택되었습니다",d:"1776년 7월 4일"},"19:30":{t:"4.19 혁명이\n일어났습니다",d:"1960년 4월 19일"},"20:00":{t:"촛불 시민혁명으로\n대통령 탄핵이 인용되었습니다",d:"2017년 3월 10일"},"20:30":{t:"스페이스X 펄컨9 로켓이\n최초 착륙에 성공하였습니다",d:"2015년 12월 22일"},"21:00":{t:"김대중 대통령이\n노벨 평화상을 수상하였습니다",d:"2000년 12월 10일"},"21:30":{t:"누리호 로켓이 우주로\n성공적으로 발사되었습니다",d:"2022년 6월 21일"},"22:00":{t:"손흥민 선수가 프리미어리그\n득점왕에 올랐습니다",d:"2022년 5월 22일"},"22:15":{t:"팀 버너스리가 월드와이드웹을\n발명하였습니다",d:"1989년 3월 12일"},"23:00":{t:"오징어 게임이 넷플릭스\n글로벌 1위를 달성하였습니다",d:"2021년 10월"},"23:40":{t:"타이타닉호가 빙산과\n충돌하였습니다",d:"1912년 4월 14일"},"23:59":{t:"하루가 저물고 있습니다.\n내일 또 다른 역사가 시작됩니다",d:"매일"}};function pad(n){return String(n).padStart(2,'0')}
const keys=Object.keys(E).sort();
function getTimeStr(h,m){const ap=h<12?'오전':'오후';const h12=h===0?12:h>12?h-12:h;return ap+' '+h12+'시 '+m+'분,';}
function findEvent(h,m){const k=pad(h)+':'+pad(m);if(E[k])return{time:k,...E[k]};return null;}
function findNext(h,m){const now=h*60+m;for(const k of keys){const[hh,mm]=k.split(':').map(Number);const t=hh*60+mm;if(t>now)return{mins:t-now};}const[hh,mm]=keys[0].split(':').map(Number);return{mins:(24*60-now)+(hh*60+mm)};}
let wakeLock=null;
async function requestWakeLock(){try{wakeLock=await navigator.wakeLock.request('screen')}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock()});
let lastKey='';
function update(){const now=new Date();const h=now.getHours(),m=now.getMinutes();const k=pad(h)+':'+pad(m);if(k===lastKey)return;lastKey=k;const timeStr=getTimeStr(h,m);const ev=findEvent(h,m);const timeEl=document.getElementById('time-text');const eventEl=document.getElementById('event-text');const dateEl=document.getElementById('date-text');const container=document.querySelector('.card');container.classList.remove('flip-in');container.classList.add('flip-out');setTimeout(()=>{timeEl.textContent=timeStr;if(ev){eventEl.innerHTML=ev.t.replace(/\\n/g,'<br>');dateEl.textContent='('+ev.d+')';}else{const next=findNext(h,m);if(next.mins<=60){eventEl.innerHTML='앞으로 '+next.mins+'분 후<br>하나의 사건이 발생합니다';}else{const hrs=Math.floor(next.mins/60);const mins=next.mins%60;eventEl.innerHTML='앞으로 '+hrs+'시간 '+mins+'분 후<br>하나의 사건이 발생합니다';}dateEl.textContent='';}container.classList.remove('flip-out');container.classList.add('flip-in');},350);}
requestWakeLock();update();setInterval(update,1000);
let logoVisible=true;document.body.addEventListener('click',()=>{logoVisible=!logoVisible;document.getElementById('logo').style.opacity=logoVisible?'0.2':'0';});
</script></body></html>
