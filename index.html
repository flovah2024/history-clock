<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>History Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:env(safe-area-inset-top) 8vw env(safe-area-inset-bottom)}
#clock-container{perspective:800px;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1}
.card{transform-style:preserve-3d;position:relative;width:100%}
#time-text,#event-text{font-size:clamp(20px,5vw,40px);font-weight:300;letter-spacing:0.01em;line-height:1.4;opacity:0.9}
#time-text{margin-bottom:0.3em}
#date-text{font-size:clamp(13px,2.5vw,18px);font-weight:300;letter-spacing:0.05em;opacity:0.35;margin-top:1em}
#second-hand-container{position:fixed;top:50%;left:50%;width:min(85vw,85vh);height:min(85vw,85vh);transform:translate(-50%,-50%);pointer-events:none;z-index:0}
#clock-container{position:relative;z-index:1}
#logo{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);font-size:12px;font-weight:300;letter-spacing:0.35em;opacity:0.2;pointer-events:none}
@media (orientation:landscape) and (max-height:500px){#time-text,#event-text{font-size:clamp(15px,3.5vh,26px);line-height:1.3}#date-text{font-size:clamp(11px,2vh,14px);margin-top:0.5em}#time-text{margin-bottom:0.15em}body{padding:env(safe-area-inset-top) 5vw env(safe-area-inset-bottom)}#clock-container{max-width:90%}}
@media (orientation:landscape) and (min-height:501px){#time-text,#event-text{font-size:clamp(20px,3.2vw,36px)}#clock-container{max-width:750px}}
@keyframes flipOut{0%{transform:rotateX(0deg);opacity:1}50%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateX(90deg);opacity:0}50%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0deg);opacity:1}}
.flip-out{animation:flipOut 0.7s ease-in forwards;transform-origin:bottom center}
.flip-in{animation:flipIn 0.7s ease-out forwards;transform-origin:top center}
</style>
</head>
<body>
<svg id="second-hand-container" viewBox="0 0 400 400">
<line id="second-hand" x1="200" y1="200" x2="200" y2="30" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>
<circle cx="200" cy="200" r="3" fill="rgba(255,255,255,0.15)"/>
</svg>
<div id="clock-container"><div class="card">
<div id="time-text"></div><div id="event-text"></div><div id="date-text"></div>
</div></div>
<div id="logo">FLOVAH</div>

function findEvent(h,m){const k=pad(h)+':'+pad(m);if(E[k])return{time:k,...E[k]};return null;}
function findNext(h,m){const now=h*60+m;for(const k of keys){const[hh,mm]=k.split(':').map(Number);const t=hh*60+mm;if(t>now)return{mins:t-now};}const[hh,mm]=keys[0].split(':').map(Number);return{mins:(24*60-now)+(hh*60+mm)};}

let lastKey='';
function isLand(){return window.innerWidth>window.innerHeight}
function update(){const now=new Date();const h=now.getHours(),m=now.getMinutes();const k=pad(h)+':'+pad(m);if(k===lastKey)return;lastKey=k;const timeStr=getTimeStr(h,m);const ev=findEvent(h,m);const timeEl=document.getElementById('time-text');const eventEl=document.getElementById('event-text');const dateEl=document.getElementById('date-text');const container=document.querySelector('.card');const nl=isLand()?' ':'<br>';container.classList.remove('flip-in');container.classList.add('flip-out');setTimeout(()=>{timeEl.textContent=timeStr;if(ev){eventEl.innerHTML=ev.t.replace(/\n/g,nl);dateEl.textContent='('+ev.d+')';}else{const next=findNext(h,m);if(next.mins<=60){eventEl.innerHTML='앞으로 '+next.mins+'분 후'+nl+'하나의 사건이 발생합니다';}else{const hrs=Math.floor(next.mins/60);const mins=next.mins%60;eventEl.innerHTML='앞으로 '+hrs+'시간 '+mins+'분 후'+nl+'하나의 사건이 발생합니다';}dateEl.textContent='';}container.classList.remove('flip-out');container.classList.add('flip-in');},350);}
requestWakeLock();update();setInterval(update,1000);
window.addEventListener('resize',()=>{lastKey='';update()});
let logoVisible=true;document.body.addEventListener('click',()=>{logoVisible=!logoVisible;document.getElementById('logo').style.opacity=logoVisible?'0.2':'0';});
</script>
</body>
</html>
