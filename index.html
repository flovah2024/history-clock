<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>History Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  #clock-container {
    text-align: center;
    perspective: 600px;
  }
  #time-display {
    font-size: 4.5rem;
    font-weight: 200;
    letter-spacing: 0.02em;
    line-height: 1.1;
    margin-bottom: 2rem;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
  }
  #time-main {
    font-size: 4.5rem;
    font-weight: 200;
  }
  #time-sec {
    font-size: 1.8rem;
    font-weight: 300;
    opacity: 0.3;
    margin-left: 0.15em;
  }
  #event-display {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #event-time {
    font-size: 1.6rem;
    font-weight: 300;
    opacity: 0.85;
    margin-bottom: 0.8rem;
  }
  #event-text {
    font-size: 1.15rem;
    font-weight: 300;
    line-height: 1.7;
    opacity: 0.7;
    max-width: 480px;
    padding: 0 1rem;
  }
  #event-date {
    font-size: 0.85rem;
    font-weight: 300;
    opacity: 0.35;
    margin-top: 0.8rem;
  }
  .flip-out {
    animation: flipOut 0.4s ease-in forwards;
  }
  .flip-in {
    animation: flipIn 0.4s ease-out forwards;
  }
  @keyframes flipOut {
    0% { transform: rotateX(0deg); opacity: 1; }
    100% { transform: rotateX(-90deg); opacity: 0; }
  }
  @keyframes flipIn {
    0% { transform: rotateX(90deg); opacity: 0; }
    100% { transform: rotateX(0deg); opacity: 1; }
  }
  #logo {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.45em;
    opacity: 0.2;
    transition: opacity 0.5s ease;
    cursor: pointer;
  }
  #logo.hidden {
    opacity: 0;
  }
  @media (orientation: portrait) {
    #time-main { font-size: 6.75rem; }
    #time-sec { font-size: 2.7rem; }
    #event-time { font-size: 2.4rem; }
    #event-text { font-size: 1.725rem; }
    #event-date { font-size: 1.275rem; }
    #logo { font-size: 1.275rem; }
  }
</style>
</head>
<body>

    <span id="time-sec"></span>
  </div>
  <div id="event-display">
    <div id="event-time"></div>
    <div id="event-text"></div>
    <div id="event-date"></div>
  </div>

<div id="logo" onclick="toggleLogo()">FLOVAH</div>

EVENTS.sort(function(a, b) {
  return (a[0] * 60 + a[1]) - (b[0] * 60 + b[1]);
});

var timeMainEl = document.getElementById("time-main");
var timeSecEl = document.getElementById("time-sec");
var eventTimeEl = document.getElementById("event-time");
var eventTextEl = document.getElementById("event-text");
var eventDateEl = document.getElementById("event-date");
var eventDisplay = document.getElementById("event-display");
var logoEl = document.getElementById("logo");
var logoVisible = true;
var lastEventKey = "";

function formatPeriod(h) {
  return h < 12 ? "오전" : "오후";
}

function formatHour12(h) {
  if (h === 0) return 12;
  if (h > 12) return h - 12;
  return h;
}

function formatTime(h, m) {
  return formatPeriod(h) + " " + formatHour12(h) + "시 " + String(m).padStart(2, "0") + "분";
}

function findCurrentEvent(h, m) {
  var totalMin = h * 60 + m;
  for (var i = EVENTS.length - 1; i >= 0; i--) {
    var evMin = EVENTS[i][0] * 60 + EVENTS[i][1];
    if (evMin === totalMin) {
      return EVENTS[i];
    }
  }
  return null;
}

function findNextEvent(h, m) {
  var totalMin = h * 60 + m;
  for (var i = 0; i < EVENTS.length; i++) {
    var evMin = EVENTS[i][0] * 60 + EVENTS[i][1];
    if (evMin > totalMin) {
      return { event: EVENTS[i], diff: evMin - totalMin };
    }
  }
  var firstEvMin = EVENTS[0][0] * 60 + EVENTS[0][1];
  return { event: EVENTS[0], diff: (1440 - totalMin) + firstEvMin };
}

function flipTransition(callback) {
  eventDisplay.classList.remove("flip-in");
  eventDisplay.classList.add("flip-out");
  setTimeout(function() {
    callback();
    eventDisplay.classList.remove("flip-out");
    eventDisplay.classList.add("flip-in");
  }, 400);
}

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes();
  var s = now.getSeconds();

  timeMainEl.textContent = formatTime(h, m);
  timeSecEl.textContent = ":" + String(s).padStart(2, "0");

  var ev = findCurrentEvent(h, m);
  var eventKey = "";

  if (ev) {
    eventKey = ev[0] + ":" + ev[1] + ":" + ev[2];
    if (eventKey !== lastEventKey) {
      flipTransition(function() {
        eventTimeEl.textContent = formatTime(ev[0], ev[1]) + ",";
        eventTextEl.innerHTML = ev[2];
        eventDateEl.textContent = "(" + ev[3] + ")";
      });
      lastEventKey = eventKey;
    }
  } else {
    var next = findNextEvent(h, m);
    eventKey = "next:" + next.diff;
    if (eventKey !== lastEventKey) {
      flipTransition(function() {
        eventTimeEl.textContent = "";
        eventTextEl.innerHTML = "앞으로 " + next.diff + "분 후<br>하나의 사건이 발생합니다";
        eventDateEl.textContent = "";
      });
      lastEventKey = eventKey;
    }
  }
}

function toggleLogo() {
  logoVisible = !logoVisible;
  if (logoVisible) {
    logoEl.classList.remove("hidden");
  } else {
    logoEl.classList.add("hidden");
  }
}

async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) {
      await navigator.wakeLock.request("screen");
    }
  } catch (e) {}
}

document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") {
    requestWakeLock();
  }
});

document.body.addEventListener("click", function(e) {
  if (e.target !== logoEl) {
    toggleLogo();
  }
});

updateClock();
setInterval(updateClock, 1000);
requestWakeLock();
</script>

</html>
