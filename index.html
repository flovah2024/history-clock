const timeEl = document.getElementById('time-line');
const eventEl = document.getElementById('event-line');
const dateEl = document.getElementById('date-line');
const clockEl = document.getElementById('clock');

function pad(n) { return n.toString().padStart(2, '0'); }

function formatTime(h, m) {
  const period = h < 12 ? '오전' : '오후';
  const hour12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${period} ${hour12}시 ${m}분,`;
}

function getTimeKey(h, m) {
  return `${pad(h)}:${pad(m)}`;
}

function getSortedKeys() {
  return Object.keys(EVENTS).sort();
}

function findNextEvent(h, m) {
  const keys = getSortedKeys();
  const currentKey = getTimeKey(h, m);
  for (const key of keys) {
    if (key > currentKey) {
      const [eh, em] = key.split(':').map(Number);
      let diffMin = (eh * 60 + em) - (h * 60 + m);
      return { key, diff: diffMin };
    }
  }
  const firstKey = keys[0];
  const [eh, em] = firstKey.split(':').map(Number);
  let diffMin = (24 * 60 - (h * 60 + m)) + (eh * 60 + em);
  return { key: firstKey, diff: diffMin };
}

function getDisplayText(h, m) {
  const key = getTimeKey(h, m);
  if (EVENTS[key]) {
    return {
      time: formatTime(h, m),
      event: EVENTS[key].text,
      date: EVENTS[key].date ? `(${EVENTS[key].date})` : ''
    };
  }
  const next = findNextEvent(h, m);
  const hours = Math.floor(next.diff / 60);
  const mins = next.diff % 60;
  let countdown = '';
  if (hours > 0 && mins > 0) countdown = `${hours}시간 ${mins}분`;
  else if (hours > 0) countdown = `${hours}시간`;
  else countdown = `${mins}분`;

  return {
    time: formatTime(h, m),
    event: `앞으로 ${countdown} 후\n하나의 사건이 발생합니다`,
    date: ''
  };
}

let lastMin = -1;

function update() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  if (m === lastMin) return;
  lastMin = m;
  const display = getDisplayText(h, m);
  clockEl.classList.add('fade-out');
  setTimeout(() => {
    timeEl.textContent = display.time;
    eventEl.textContent = display.event;
    dateEl.textContent = display.date;
    clockEl.classList.remove('fade-out');
  }, 600);
}

(function init() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  lastMin = m;
  const display = getDisplayText(h, m);
  timeEl.textContent = display.time;
  eventEl.textContent = display.event;
  dateEl.textContent = display.date;
})();

setInterval(update, 1000);

// Second hand
const secondHand = document.getElementById('second-hand');
function animateSecondHand() {
  const now = new Date();
  const s = now.getSeconds();
  const ms = now.getMilliseconds();
  const deg = ((s + ms / 1000) / 60) * 360;
  secondHand.setAttribute('transform', `rotate(${deg} 200 200)`);
  requestAnimationFrame(animateSecondHand);
}
animateSecondHand();

async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
    }
  } catch (e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
