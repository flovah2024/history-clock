<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>History Clock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400&family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Gowun Batang','EB Garamond','Georgia','Times New Roman',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none;transition:background-color 1.5s ease,color 1.5s ease}
body{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:env(safe-area-inset-top) 8vw env(safe-area-inset-bottom)}
body.light-mode{background:#fff;color:#000}
body.beige-mode{background:#f5f0e8;color:#2a2520}
body.navy-mode{background:#0a1628;color:#c8d6e5}

/* 초침 테마별 색상 */
body.light-mode #second-hand{stroke:rgba(0,0,0,0.25)}
body.light-mode #second-hand-container circle{fill:rgba(0,0,0,0.12)}
body.beige-mode #second-hand{stroke:rgba(42,37,32,0.25)}
body.beige-mode #second-hand-container circle{fill:rgba(42,37,32,0.12)}
body.navy-mode #second-hand{stroke:rgba(200,214,229,0.25)}
body.navy-mode #second-hand-container circle{fill:rgba(200,214,229,0.12)}
#clock-container{perspective:800px;width:100%;max-width:600px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;flex:1}
.card{transform-style:preserve-3d;position:relative;width:100%}
#time-text,#event-text{font-size:clamp(30px,7.5vw,60px);font-weight:300;letter-spacing:0em;line-height:1.4;opacity:0.9}
#time-text{margin-bottom:0.3em}
#date-text{font-size:clamp(19.5px,3.75vw,27px);font-weight:300;letter-spacing:0em;opacity:0.35;margin-top:1em;text-align:right;word-break:keep-all}
#second-hand-container{position:fixed;top:50%;left:50%;width:min(85vw,85vh);height:min(85vw,85vh);transform:translate(-50%,-50%);pointer-events:none;z-index:0}
#second-number{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(100px,25vw,200px);font-weight:100;opacity:0.055;pointer-events:none;z-index:0;letter-spacing:0em;display:none;line-height:1;font-variant-numeric:tabular-nums}
#clock-container{position:relative;z-index:1}
#logo{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));left:50%;transform:translateX(-50%);opacity:0.2;pointer-events:none;transition:opacity 0.3s ease}
#logo img{height:clamp(14px,2.5vw,22px);width:auto;display:block;filter:brightness(0) invert(1)}
body.light-mode #logo img{filter:brightness(0)}
body.beige-mode #logo img{filter:brightness(0) sepia(0.4)}
body.navy-mode #logo img{filter:brightness(0) invert(1)}
@media (orientation:landscape) and (max-height:700px){#time-text,#event-text{font-size:clamp(40px,7vh,56px);line-height:1.2}#date-text{font-size:clamp(17px,2.5vh,20px);margin-top:0.3em;opacity:0.5;text-align:right;word-break:keep-all}#time-text{margin-bottom:0.1em}body{padding:env(safe-area-inset-top) 4vw env(safe-area-inset-bottom)}#clock-container{max-width:95%}.settings-btn{font-size:clamp(13px,2.3vh,15px);padding:clamp(8px,1.7vh,11px) clamp(14px,2.6vw,20px)}}
@media (orientation:landscape) and (min-height:701px){#time-text,#event-text{font-size:clamp(36px,4.5vw,60px);line-height:1.3}#date-text{font-size:clamp(15px,2.2vw,21px);margin-top:0.4em;opacity:0.5;text-align:right;word-break:keep-all}body{padding:env(safe-area-inset-top) 6vw env(safe-area-inset-bottom)}#clock-container{max-width:800px}.settings-btn{font-size:clamp(14px,2.2vw,16px);padding:clamp(9px,1.8vh,12px) clamp(17px,2.8vw,23px)}.bar-label{font-size:clamp(12px,1.8vw,14px)}}
@keyframes flipOut{0%{transform:rotateX(0deg);opacity:1}50%{transform:rotateX(-90deg);opacity:0}100%{transform:rotateX(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateX(90deg);opacity:0}50%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0deg);opacity:1}}
.flip-out{animation:flipOut 0.7s ease-in forwards;transform-origin:bottom center}
.flip-in{animation:flipIn 0.7s ease-out forwards;transform-origin:top center}

/* Intro Screen */
#intro-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:100;background:#000;opacity:1;transition:opacity 0.8s ease;pointer-events:auto;cursor:pointer}
#intro-screen.hidden{opacity:0;pointer-events:none}
#intro-title{position:absolute;font-size:clamp(28px,8vw,56px);font-weight:300;letter-spacing:0em;text-align:center;opacity:0;transition:opacity 2s ease;pointer-events:none}
#intro-title.show{opacity:1;transition:opacity 3s ease}
#intro-logo{position:absolute;margin-top:clamp(100px,20vw,160px);opacity:0;transition:opacity 2s ease;pointer-events:none}
#intro-logo.show{opacity:1;transition:opacity 3s ease}
#intro-logo img{height:clamp(16px,3vw,26px);width:auto;filter:brightness(0) invert(1)}
#intro-touch-hint{position:fixed;bottom:0;left:50%;transform:translateX(-50%);font-size:clamp(14px,3vw,18px);font-weight:300;font-family:'Noto Sans KR','Georgia',sans-serif;text-align:center;opacity:0;transition:opacity 1s ease;pointer-events:none;padding:clamp(20px,4vw,30px) 20px}
#intro-touch-hint.show{opacity:0.6;animation:slideUp 1.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
#intro-touch-hint.hide{animation:slideDown 1.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards}
@keyframes slideUp{from{transform:translateX(-50%) translateY(40px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:0.6}}
@keyframes slideDown{from{transform:translateX(-50%) translateY(0);opacity:0.6}to{transform:translateX(-50%) translateY(40px);opacity:0}}
#intro-description{position:absolute;font-size:clamp(16px,4vw,32px);font-weight:300;text-align:center;line-height:1.8;opacity:0;transition:opacity 2s ease;max-width:85%;letter-spacing:0em;pointer-events:none}
#intro-description.show{opacity:0.8;transition:opacity 1.5s ease}

/* Skip button */
#skip-btn{position:fixed;bottom:clamp(20px,4vw,30px);right:clamp(16px,3vw,24px);padding:clamp(10px,2vw,14px) clamp(18px,3.5vw,26px);background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;color:#fff;font-size:clamp(12px,2.5vw,14px);font-weight:400;font-family:'Noto Sans KR','Georgia',sans-serif;cursor:pointer;z-index:102;opacity:0;transition:all 0.3s ease;pointer-events:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);user-select:none;-webkit-user-select:none}
#skip-btn:hover{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.5)}
#skip-btn.show{opacity:0.8;pointer-events:auto}

/* Bottom toolbar */
#settings-bar{position:fixed;bottom:0;left:0;width:100%;z-index:99;transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),background-color 1.5s ease;background:rgba(20,20,20,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:clamp(14px,3vw,20px) clamp(16px,4vw,24px) max(clamp(14px,3vw,20px),env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:center;gap:clamp(16px,4vw,28px);flex-wrap:wrap}
#settings-bar.show{transform:translateY(0)}
body.light-mode #settings-bar{background:rgba(245,245,245,0.9)}
body.beige-mode #settings-bar{background:rgba(240,235,225,0.9)}
body.navy-mode #settings-bar{background:rgba(10,22,40,0.9)}
.bar-section{display:flex;align-items:center;gap:clamp(6px,1.5vw,8px)}
.bar-label{font-size:clamp(10px,2vw,12px);font-weight:400;font-family:'Noto Sans KR','Georgia',sans-serif;opacity:0.35;letter-spacing:0em;margin-right:2px}
.bar-divider{width:1px;height:20px;background:rgba(255,255,255,0.12);margin:0 clamp(4px,1vw,8px)}
body.light-mode .bar-divider{background:rgba(0,0,0,0.12)}
body.beige-mode .bar-divider{background:rgba(42,37,32,0.12)}
body.navy-mode .bar-divider{background:rgba(200,214,229,0.12)}
.settings-btn{padding:clamp(7px,1.8vw,10px) clamp(14px,3vw,20px);border:none;border-radius:16px;font-size:clamp(12px,2.5vw,14px);font-weight:400;font-family:'Noto Sans KR','Georgia',sans-serif;cursor:pointer;background:rgba(255,255,255,0.08);color:#fff;transition:all 0.25s ease,background-color 1.5s ease,color 1.5s ease;letter-spacing:0em;white-space:nowrap}
.settings-btn:hover{background:rgba(255,255,255,0.18)}
.settings-btn.active{background:rgba(255,255,255,0.95);color:#000}
body.light-mode .settings-btn{background:rgba(0,0,0,0.07);color:#000}
body.light-mode .settings-btn.active{background:rgba(0,0,0,0.85);color:#fff}
body.beige-mode .settings-btn{background:rgba(42,37,32,0.08);color:#2a2520}
body.beige-mode .settings-btn.active{background:#8b6f47;color:#fff}
body.navy-mode .settings-btn{background:rgba(200,214,229,0.08);color:#c8d6e5}
body.navy-mode .settings-btn.active{background:#4a7cc9;color:#fff}

/* Clock fade in — staggered: second hand first, then text */
#clock-container,#second-hand-container,#second-number,#logo{opacity:0}
#second-hand-container,#second-number{transition:opacity 2.5s ease}
#clock-container{transition:opacity 2s ease 1.2s}
#logo{transition:opacity 2s ease 2s}
body.clock-ready #second-hand-container{opacity:1}
body.clock-ready #second-number{opacity:1}
body.clock-ready #clock-container{opacity:1}
body.clock-ready #logo{opacity:0.2}

/* Tip messages after start */
#tip-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:98;pointer-events:none}
.tip-msg{position:absolute;font-size:clamp(20px,5vw,36px);font-weight:300;text-align:center;line-height:1.8;letter-spacing:0em;max-width:85%;opacity:0;transition:opacity 1.2s ease}
.tip-msg.show{opacity:0.7}
.tip-msg.fade-out{opacity:0;transition:opacity 1.5s ease}
</style>
</head>

// Settings state
let settings={
theme:'dark',
secondHand:'needle',
hasSeenIntro:false
};

function applyTheme(){
const body=document.body;
body.classList.remove('dark-mode','light-mode','beige-mode','navy-mode');
if(settings.theme==='light'){body.classList.add('light-mode');}
else if(settings.theme==='beige'){body.classList.add('beige-mode');}
else if(settings.theme==='navy'){body.classList.add('navy-mode');}
else{body.classList.add('dark-mode');}
}

function updateSecondHandVisibility(){
const svg=document.getElementById('second-hand-container');
const num=document.getElementById('second-number');
svg.style.display=settings.secondHand==='needle'?'block':'none';
num.style.display=settings.secondHand==='number'?'block':'none';
}

function showSettings(){
const bar=document.getElementById('settings-bar');
bar.classList.toggle('show');
}

function hideSettings(){
const bar=document.getElementById('settings-bar');
bar.classList.remove('show');
}

function hideIntro(){
const intro=document.getElementById('intro-screen');
intro.classList.add('hidden');
setTimeout(()=>{
intro.style.display='none';
settings.hasSeenIntro=true;
// 팁 메시지 → 시계 시작
const tip1=document.getElementById('tip-1');
const tip2=document.getElementById('tip-2');
setTimeout(()=>{tip1.classList.add('show');},500);
setTimeout(()=>{tip1.classList.add('fade-out');},2800);
setTimeout(()=>{tip2.classList.add('show');},4500);
setTimeout(()=>{tip2.classList.add('fade-out');},6800);
setTimeout(()=>{
document.getElementById('tip-screen').style.display='none';
document.body.classList.add('clock-ready');
},8500);
},800);
}

// Intro sequence — 터치 또는 8초 자동 진행
let _introStep=0;
let _introLock=false;
let _autoTimer=null;
function startIntro(){
const title=document.getElementById('intro-title');
const introLogo=document.getElementById('intro-logo');
const desc=document.getElementById('intro-description');
const intro=document.getElementById('intro-screen');

function goNext(){
if(_introLock)return;
_introLock=true;
if(_autoTimer){clearTimeout(_autoTimer);_autoTimer=null;}
_introStep++;
if(_introStep===1){
title.classList.remove('show');
introLogo.classList.remove('show');
touchHint.classList.add('hide');
setTimeout(()=>{
desc.classList.add('show');
_introLock=false;
_autoTimer=setTimeout(goNext,8000);
},2200);
}else if(_introStep===2){
desc.classList.remove('show');
setTimeout(()=>{hideIntro();_introLock=false;},2200);
}
}

// 타이틀 3초에 걸쳐 서서히 등장, 로고도 함께
setTimeout(()=>{title.classList.add('show');introLogo.classList.add('show');},500);
// 4.5초 후 터치 힌트 나타남
const touchHint=document.getElementById('intro-touch-hint');
const skipBtn=document.getElementById('skip-btn');
setTimeout(()=>{touchHint.classList.add('show');skipBtn.classList.add('show');},4500);
// 8초 후 자동 진행
_autoTimer=setTimeout(goNext,8000);

function hideHint(){touchHint.classList.add('hide');}
intro.addEventListener('click',()=>{hideHint();goNext();});
intro.addEventListener('touchend',(e)=>{e.preventDefault();hideHint();goNext();},{passive:false});
skipBtn.addEventListener('click',(e)=>{e.stopPropagation();clearTimeout(_autoTimer);hideHint();goNext();});
}

// Settings buttons
document.querySelectorAll('[data-theme]').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('[data-theme]').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
settings.theme=btn.dataset.theme;
applyTheme();
});
});

document.querySelectorAll('[data-hand]').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('[data-hand]').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
settings.secondHand=btn.dataset.hand;
updateSecondHandVisibility();
});
});

function pad(n){return String(n).padStart(2,'0')}
const keys=Object.keys(E).sort();
function getTimeStr(h,m){const ap=h<12?'오전':'오후';const h12=h===0?12:h>12?h-12:h;return ap+' '+h12+'시 '+m+'분,';}
function numToKor(n){const nums=['','일','이','삼','사','오','육','칠','팔','구'];if(n<10)return nums[n];const tens=Math.floor(n/10);const ones=n%10;return(tens>0?nums[tens]+'십':'')+(ones?nums[ones]:'');}
function hrToKor(h){const hrs=['','한','두','세','네','다섯','여섯','일곱','여덟','아홉'];return h<10?hrs[h]:numToKor(h);}
function findEvent(h,m){const k=pad(h)+':'+pad(m);if(E[k])return{time:k,...E[k]};return null;}
function findNext(h,m){const now=h*60+m;for(const k of keys){const[hh,mm]=k.split(':').map(Number);const t=hh*60+mm;if(t>now)return{mins:t-now};}const[hh,mm]=keys[0].split(':').map(Number);return{mins:(24*60-now)+(hh*60+mm)};}
let wakeLock=null;
async function requestWakeLock(){try{wakeLock=await navigator.wakeLock.request('screen')}catch(e){}}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')requestWakeLock()});
const secondHand=document.getElementById('second-hand');
function animateSecondHand(){const now=new Date();const s=now.getSeconds();const ms=now.getMilliseconds();const deg=((s+ms/1000)/60)*360;secondHand.setAttribute('transform','rotate('+deg+' 200 200)');if(settings.secondHand==='number'){document.getElementById('second-number').textContent=String(s).padStart(2,'0');}requestAnimationFrame(animateSecondHand);}
animateSecondHand();
let lastKey='';
function isLand(){return window.innerWidth>window.innerHeight}
function update(){
const now=new Date();const h=now.getHours(),m=now.getMinutes();
const k=pad(h)+':'+pad(m);if(k===lastKey)return;lastKey=k;
const timeStr=getTimeStr(h,m);const ev=findEvent(h,m);
const timeEl=document.getElementById('time-text');
const eventEl=document.getElementById('event-text');
const dateEl=document.getElementById('date-text');
const nl=isLand()?' ':'<br>';
const els=[timeEl,eventEl,dateEl];
const stagger=300;
// 순차적 플립 아웃
els.forEach((el,i)=>{
setTimeout(()=>{el.classList.remove('flip-in');el.classList.add('flip-out');},i*stagger);
});
// 모든 요소가 사라진 후 내용 교체 & 순차적 플립 인
setTimeout(()=>{
timeEl.textContent=timeStr;
if(ev){eventEl.innerHTML=ev.t.replace(/\n/g,nl);dateEl.textContent=ev.d;}
else{const next=findNext(h,m);if(next.mins<=60){eventEl.innerHTML='앞으로 '+numToKor(next.mins)+'분 후 하나의 사건이 발생합니다';}else{const hrs=Math.floor(next.mins/60);const mins=next.mins%60;eventEl.innerHTML='앞으로 '+hrToKor(hrs)+'시간 '+(mins?numToKor(mins)+'분':'')+'후 하나의 사건이 발생합니다';}dateEl.textContent='';}
els.forEach((el,i)=>{
setTimeout(()=>{el.classList.remove('flip-out');el.classList.add('flip-in');},i*stagger);
});
},(els.length-1)*stagger+350);
}
requestWakeLock();update();setInterval(update,1000);
window.addEventListener('resize',()=>{lastKey='';update()});

// 화면 터치로 하단 툴바 토글
document.addEventListener('click',(e)=>{
if(!settings.hasSeenIntro)return;
// 툴바 내부 클릭은 무시
if(document.getElementById('settings-bar').contains(e.target))return;
const bar=document.getElementById('settings-bar');
bar.classList.toggle('show');
});

// Apply initial settings and start intro
applyTheme();
updateSecondHandVisibility();
startIntro();

</script>
</body>
</html>
