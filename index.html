<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;user-select:none;-webkit-user-select:none}
body{display:flex;align-items:center;justify-content:center;flex-direction:column;perspective:800px}
#clock-container{display:flex;flex-direction:column;align-items:center;justify-content:center;width:90%;max-width:600px;min-height:60vh;perspective:800px}
#time-line{font-size:clamp(1.2rem,4vw,2rem);font-weight:300;letter-spacing:0.02em;line-height:1.4;margin-bottom:0.3em;opacity:0.95}
#event-text{font-size:clamp(1.2rem,4vw,2rem);font-weight:300;letter-spacing:0.01em;line-height:1.6;text-align:center;word-break:keep-all;white-space:pre-line}
#date-line{font-size:clamp(0.75rem,2.2vw,1rem);font-weight:300;letter-spacing:0.03em;opacity:0.45;margin-top:0.8em}
.flip-wrapper{perspective:800px;display:inline-block}
.flip-out{animation:flipOut 0.35s ease-in forwards}
.flip-in{animation:flipIn 0.35s ease-out forwards}
@keyframes flipOut{0%{transform:rotateX(0);opacity:1}100%{transform:rotateX(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateX(90deg);opacity:0}100%{transform:rotateX(0);opacity:1}}
#countdown-text{font-size:clamp(1rem,3.2vw,1.5rem);font-weight:300;letter-spacing:0.01em;line-height:1.6;text-align:center;opacity:0.7}
#flovah-logo{position:fixed;bottom:clamp(16px,4vh,32px);left:50%;transform:translateX(-50%);font-size:clamp(10px,1.8vw,14px);font-weight:300;letter-spacing:0.35em;opacity:0.25;transition:opacity 0.5s ease;cursor:default}
#flovah-logo.hidden{opacity:0}
</style>

events.sort((a,b)=>(a.h*60+a.m)-(b.h*60+b.m));

const timeLine=document.getElementById('time-line');
const eventText=document.getElementById('event-text');
const dateLine=document.getElementById('date-line');
const countdownText=document.getElementById('countdown-text');
const logo=document.getElementById('flovah-logo');
let lastMinute=-1;
let wakeLock=null;

function getAmPm(h){return h<12?'矛聵陇矛聽聞':'矛聵陇铆聸聞'}
function get12Hour(h){const hh=h%12;return hh===0?12:hh}
function padMin(m){return m<10?'0'+m:m}

function findCurrentEvent(h,m){
  const now=h*60+m;
  for(let i=events.length-1;i>=0;i--){
    const et=events[i].h*60+events[i].m;
    if(et<=now)return{event:events[i],index:i};
  }
  return{event:events[events.length-1],index:events.length-1};
}

function findNextEvent(h,m){
  const now=h*60+m;
  for(let i=0;i<events.length;i++){
    const et=events[i].h*60+events[i].m;
    if(et>now)return{event:events[i],minutesUntil:et-now};
  }
  const firstT=events[0].h*60+events[0].m;
  return{event:events[0],minutesUntil:(1440-now)+firstT};
}

function applyFlip(el,newContent){
  el.classList.remove('flip-in');
  el.classList.add('flip-out');
  setTimeout(()=>{
    if(typeof newContent==='string'){el.textContent=newContent}
    else{el.innerHTML=newContent}
    el.classList.remove('flip-out');
    el.classList.add('flip-in');
  },350);
}

function update(){
  const now=new Date();
  const h=now.getHours();
  const m=now.getMinutes();
  const currentMinute=h*60+m;

  if(currentMinute===lastMinute)return;

  const ampm=getAmPm(h);
  const h12=get12Hour(h);
  const timeStr=ampm+' '+h12+'矛聥聹 '+padMin(m)+'毛露聞,';

  const nowTotal=h*60+m;
  let matched=null;
  for(let i=0;i<events.length;i++){
    const et=events[i].h*60+events[i].m;
    if(et===nowTotal){matched=events[i];break}
  }

  if(lastMinute===-1){
    if(matched){
      timeLine.textContent=timeStr;
      eventText.textContent=matched.title;
      dateLine.textContent='('+matched.date+')';
      countdownText.textContent='';
    }else{
      const next=findNextEvent(h,m);
      timeLine.textContent='';
      eventText.textContent='';
      dateLine.textContent='';
      countdownText.textContent='矛聲聻矛聹录毛隆聹 '+next.minutesUntil+'毛露聞 铆聸聞,\n铆聲聵毛聜聵矛聺聵 矛聜卢锚卤麓矛聺麓 毛掳聹矛聝聺铆聲漏毛聥聢毛聥陇';
    }
  }else{
    if(matched){
      applyFlip(timeLine,timeStr);
      applyFlip(eventText,matched.title);
      setTimeout(()=>{dateLine.textContent='('+matched.date+')'},350);
      countdownText.textContent='';
    }else{
      const next=findNextEvent(h,m);
      if(timeLine.textContent!=='')applyFlip(timeLine,'');
      if(eventText.textContent!=='')applyFlip(eventText,'');
      dateLine.textContent='';
      applyFlip(countdownText,'矛聲聻矛聹录毛隆聹 '+next.minutesUntil+'毛露聞 铆聸聞,\n铆聲聵毛聜聵矛聺聵 矛聜卢锚卤麓矛聺麓 毛掳聹矛聝聺铆聲漏毛聥聢毛聥陇');
    }
  }
  lastMinute=currentMinute;
}

async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock=await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release',()=>{wakeLock=null});
    }
  }catch(e){}
}

document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'){
    requestWakeLock();
    lastMinute=-1;
    update();
  }
});

document.body.addEventListener('click',()=>{
  logo.classList.toggle('hidden');
});

requestWakeLock();
update();
setInterval(update,1000);
</script>
